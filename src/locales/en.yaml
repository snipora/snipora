sidebar:
  new-snippet:
    label: New Snippet
  global-search:
    label: Search Snippets
  all-snippets:
    label: All Snippets
  untagged:
    label: Untagged
  settings:
    label: Settings
settings:
  general:
    title: General
    startup:
      label: Launch at Startup
      description: Automatically launch Snipora when you log in to your computer
    shortcut:
      label: Search Popup Shortcut
      description: Select the shortcut you want to use to open the search popup
      placeholder: Ctrl+Shift+Space
    use-behavior:
      label: Snippet Usage Behavior
      description: Choose how snippets are used
      copy-to-clipboard:
        label: Copy to Clipboard
        description: Copies the snippet content directly into your clipboard
      simulate-paste:
        label: Simulate Paste
        description: Automatically pastes the snippet
      natural-typing:
        label: Natural Typing
        description: Types the snippet as if you were typing it
  appearance:
    title: Appearance
    show-tag-counts:
      label: Tag Count in Sidebar
      description: Show number of snippets next to each tag
    trayTheme:
      label: Tray Icon Theme
      description: Choose how the tray icon appears
      options:
        app-icon: Snipora Icon
        light: Light
        dark: Dark
    uiTheme:
      label: UI Theme
      description: Choose the application theme
      options:
        system: System
        light: Light
        dark: Dark
dialogs:
  new-snippet:
    dialog-title: Create New Snippet
    dialog-description: Add a new snippet to your collection.
    form:
      label-placeholder: Enter a descriptive label
      snippet-placeholder: Paste your snippet content here
      tags-placeholder: Add tags...
      cancel: Cancel
      create: Create
    error:
      title: Unable to create snippet
  edit-snippet:
    dialog-title: Edit Snippet
    dialog-description: Update the snippet data.
    form:
      label-placeholder: Enter a descriptive label
      snippet-placeholder: Paste your snippet content here
      tags-placeholder: Add tags...
      cancel: Cancel
      save: Save
    error:
      title: Unable to update snippet
  delete-snippet:
    dialog-title: Delete Snippet
    dialog-description: Are you sure you want to delete this snippet? This action cannot be undone.
    confirm: Delete
    cancel: Cancel
popup:
  input:
    placeholder: Search for snippets...
components:
  no-snippets:
    title: Nothing here yet
    description: Start adding snippets to see them appear
  something-went-wrong:
    title: Something went wrong
    description: This shouldn't have happened.
  tags-input-with-completion:
    no-tags: No Tags
